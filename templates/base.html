<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Dog Growth Journal{% endblock %}</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="shell header-shell">
        <a class="brand" href="/">Dog Growth Journal</a>
        <nav class="nav">
          {% if current_user %}
            <a href="/dogs">犬一覧</a>
            <a href="/records">記録一覧</a>
            {% if current_user.is_admin %}
              <a href="/admin">管理画面</a>
            {% endif %}
            <a href="/account/password">パスワード変更</a>
            <span class="user-chip">{{ current_user.email }}</span>
            <form method="post" action="/logout">
              <button class="link-button nav-button" type="submit">ログアウト</button>
            </form>
          {% elif has_users %}
            <a href="/login">ログイン</a>
            <a href="/register">新規登録</a>
          {% else %}
            <a href="/setup">初期設定</a>
          {% endif %}
        </nav>
      </div>
    </header>
    <main class="shell page-shell">
      {% if notice %}
        <div class="notice-banner">{{ notice }}</div>
      {% endif %}
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
