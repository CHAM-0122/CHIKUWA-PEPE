services:
  app:
    build: .
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
    expose:
      - "8000"

  db:
    image: postgres:16-alpine
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dogapp} -d ${POSTGRES_DB:-dogapp}"]
      interval: 5s
      timeout: 5s
      retries: 10
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dogapp}
      POSTGRES_USER: ${POSTGRES_USER:-dogapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dogapp}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - app
    ports:
      - "${PUBLIC_PORT:-8001}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./uploads:/app/uploads:ro

volumes:
  postgres_data:
