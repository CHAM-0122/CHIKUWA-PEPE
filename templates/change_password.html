{% extends "base.html" %}

{% block title %}パスワード変更 | Dog Growth Journal{% endblock %}

{% block content %}
  <section class="auth-shell">
    <div class="card auth-panel">
      <h1>パスワード変更</h1>
      <p class="auth-copy">現在のパスワードを確認して、新しいパスワードへ更新します。</p>

      {% include "partials/errors.html" %}

      <form method="post" class="stack-form">
        <label>
          現在のパスワード
          <input type="password" name="current_password" autocomplete="current-password" required />
        </label>
        <label>
          新しいパスワード
          <input type="password" name="new_password" autocomplete="new-password" minlength="8" required />
        </label>
        <label>
          新しいパスワード（確認）
          <input type="password" name="new_password_confirm" autocomplete="new-password" minlength="8" required />
        </label>
        <button type="submit">パスワードを更新</button>
      </form>
    </div>
  </section>
{% endblock %}
