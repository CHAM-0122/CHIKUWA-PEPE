{% extends "base.html" %}
{% block title %}記録編集 | Dog Growth Journal{% endblock %}
{% block content %}
<section class="panel narrow">
  <div class="panel-head">
    <h1>記録を編集</h1>
    <div class="action-row compact">
      <a class="button ghost" href="/dogs/{{ record.dog_id }}">戻る</a>
      <form method="post" action="/records/{{ record.id }}/delete" onsubmit="return confirm('この記録を削除しますか？');">
        <button class="button danger" type="submit">記録を削除</button>
      </form>
    </div>
  </div>
  {% include "partials/errors.html" %}
  {% include "partials/record_form.html" %}
  {% if record.photo_path %}
    <div class="preview-block">
      <p class="eyebrow">現在の写真</p>
      <div class="record-media wide">
        <img class="record-image" src="/uploads/{{ record.photo_path }}" alt="現在の記録写真" />
      </div>
    </div>
  {% endif %}
</section>
{% endblock %}
